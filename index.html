<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHR Training System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .sidebar {
            width: 280px;
            background-color: #1a202c;
            color: white;
            transition: transform 0.3s ease-in-out;
            transform: translateX(0);
        }
        .main-content {
            flex-grow: 1;
            transition: margin-left 0.3s ease-in-out;
            margin-left: 280px;
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                height: 100%;
                z-index: 50;
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .progress-bar {
            height: 10px;
        }
        .btn-primary {
            background-color: #4c51bf;
        }
        .btn-primary:hover {
            background-color: #434190;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            transition: border-color 0.2s;
        }
        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            border-color: #4c51bf;
            outline: none;
        }
        .patient-list-item {
            cursor: pointer;
            border-radius: 8px;
            padding: 12px;
            transition: background-color 0.2s;
        }
        .patient-list-item:hover {
            background-color: #f3f4f6;
        }
        .patient-list-item.active {
            background-color: #e5e7eb;
            font-weight: 500;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background-color: #e5e7eb;
        }
        .calendar-day {
            background-color: white;
            min-height: 100px;
            padding: 8px;
            border-radius: 4px;
        }
        .drag-target {
            border: 2px dashed #9ca3af;
            min-height: 100px;
            border-radius: 8px;
            padding: 1rem;
            transition: background-color 0.2s;
        }
        .drag-target.drag-over {
            background-color: #d1d5db;
        }
    </style>
</head>
<body class="flex min-h-screen">
    <div id="sidebar" class="sidebar p-6 flex flex-col items-center">
        <h2 class="text-2xl font-bold mb-8">MedEHR Training</h2>
        <nav class="w-full">
            <ul class="space-y-4">
                <li><a href="#" class="block py-2 px-4 rounded-lg text-white font-medium bg-gray-700/50" data-module="dashboard">Dashboard</a></li>
                <li><a href="#" class="block py-2 px-4 rounded-lg text-gray-300 hover:bg-gray-700/50 transition-colors" data-module="patient-registration">Patient Registration</a></li>
                <li><a href="#" class="block py-2 px-4 rounded-lg text-gray-300 hover:bg-gray-700/50 transition-colors" data-module="interactive-calendar">Interactive Calendar</a></li>
                <li><a href="#" class="block py-2 px-4 rounded-lg text-gray-300 hover:bg-gray-700/50 transition-colors" data-module="coding-quiz">Medical Coding Quiz</a></li>
                <li><a href="#" class="block py-2 px-4 rounded-lg text-gray-300 hover:bg-gray-700/50 transition-colors" data-module="soap-notes">SOAP Notes</a></li>
                <li><a href="#" class="block py-2 px-4 rounded-lg text-gray-300 hover:bg-gray-700/50 transition-colors" data-module="denial-management">Denial Management</a></li>
                <li><a href="#" class="block py-2 px-4 rounded-lg text-gray-300 hover:bg-gray-700/50 transition-colors" data-module="prior-authorization">Prior Authorization</a></li>
                <li><a href="#" class="block py-2 px-4 rounded-lg text-gray-300 hover:bg-gray-700/50 transition-colors" data-module="ar-aging">A/R Aging</a></li>
                <li><a href="#" class="block py-2 px-4 rounded-lg text-gray-300 hover:bg-gray-700/50 transition-colors" data-module="e-prescribing">E-Prescribing</a></li>
                <li><a href="#" class="block py-2 px-4 rounded-lg text-gray-300 hover:bg-gray-700/50 transition-colors" data-module="patient-data">Patient Data</a></li>
                <li><a href="#" class="block py-2 px-4 rounded-lg text-gray-300 hover:bg-gray-700/50 transition-colors" data-module="vitals">Vitals</a></li>
            </ul>
        </nav>
        <!-- Mobile menu toggle -->
        <button id="mobile-menu-toggle" class="md:hidden fixed top-4 left-4 p-2 rounded-full bg-gray-800 text-white z-50">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </div>

    <div class="main-content p-8">
        <header class="flex items-center justify-between mb-8">
            <h1 id="page-title" class="text-4xl font-extrabold text-gray-800">Dashboard</h1>
            <div id="auth-status" class="flex items-center text-gray-600">
                <span id="user-info" class="mr-2"></span>
                <span id="user-id-display"></span>
            </div>
        </header>
        
        <main id="content-area">
            <!-- Content will be injected here -->
        </main>
    </div>

    <div id="message-box" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-red-500 text-white p-4 rounded-lg shadow-lg z-50 hidden"></div>
    <div id="modal-container" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center p-4 hidden">
        <div id="modal-content" class="bg-white p-6 rounded-lg shadow-xl w-full max-w-xl"></div>
    </div>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // Log all Firestore actions to the console for debugging
        setLogLevel('Debug');

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let app, db, auth, userId;
        let isAuthReady = false;
        let patientList = [];

        const modules = {
            'patient-registration': {
                steps: 5,
                progressKey: 'pr-progress',
                statusId: 'pr-status'
            },
            'interactive-calendar': {
                steps: 3,
                progressKey: 'ic-progress',
                statusId: 'ic-status'
            },
            'coding-quiz': {
                steps: 1,
                progressKey: 'cq-progress',
                statusId: 'cq-status'
            },
            'soap-notes': {
                steps: 4,
                progressKey: 'sn-progress',
                statusId: 'sn-status'
            },
            'denial-management': {
                steps: 1,
                progressKey: 'dm-progress',
                statusId: 'dm-status'
            },
            'prior-authorization': {
                steps: 1,
                progressKey: 'pa-progress',
                statusId: 'pa-status'
            },
            'ar-aging': {
                steps: 1,
                progressKey: 'ar-progress',
                statusId: 'ar-status'
            },
            'e-prescribing': {
                steps: 3,
                progressKey: 'ep-progress',
                statusId: 'ep-status'
            },
            'patient-data': {
                steps: 1,
                progressKey: 'pd-progress',
                statusId: 'pd-status'
            },
            'vitals': {
                steps: 1,
                progressKey: 'vitals-progress',
                statusId: 'vitals-status'
            }
        };

        let moduleProgress = {};

        // Authentication and Firestore Initialization
        async function initializeFirebase() {
            try {
                if (Object.keys(firebaseConfig).length > 0) {
                    app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    onAuthStateChanged(auth, async (user) => {
                        if (user) {
                            userId = user.uid;
                            document.getElementById('user-id-display').textContent = `User: ${userId}`;
                            isAuthReady = true;
                            // Set up real-time listener for user data
                            const userDocRef = doc(db, 'artifacts', appId, 'users', userId);
                            onSnapshot(userDocRef, (docSnap) => {
                                if (docSnap.exists()) {
                                    const data = docSnap.data();
                                    moduleProgress = data.progress || {};
                                } else {
                                    moduleProgress = {};
                                }
                                updateDashboardUI();
                            }, (error) => {
                                console.error("Error listening to document: ", error);
                                showMessage('Error listening to progress. Please check your Firestore connection.', false);
                            });
                            // Set up real-time listener for patient data
                            const patientsCollection = collection(db, 'artifacts', appId, 'public', 'data', 'patients');
                            onSnapshot(patientsCollection, (snapshot) => {
                                patientList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                patientList.sort((a, b) => a.name.localeCompare(b.name));
                                // Re-render if on a patient-data-dependent page
                                if (document.getElementById('patient-data')) {
                                    renderPatientData();
                                }
                                if (document.getElementById('e-prescribing')) {
                                    renderEPrescribing();
                                }
                            }, (error) => {
                                console.error("Error loading patient data. Please check your Firestore connection.", error);
                                showMessage('Error loading patient data. Please check your Firestore connection.', false);
                            });

                            // Add some initial patient data if the collection is empty
                            const patientDocs = await getDocs(patientsCollection);
                            if (patientDocs.empty) {
                                await addSamplePatients();
                            }
                        } else {
                            userId = null;
                            await signInAnonymously(auth);
                        }
                    });

                    // Use the custom token if provided
                    if (initialAuthToken) {
                        try {
                            await signInWithCustomToken(auth, initialAuthToken);
                        } catch (error) {
                            console.error("Error signing in with custom token: ", error);
                            await signInAnonymously(auth);
                        }
                    } else {
                        await signInAnonymously(auth);
                    }
                } else {
                    console.error("Firebase config is missing.");
                    showMessage('Firebase is not configured. Data will not be saved.', false);
                }
            } catch (error) {
                console.error("Firebase initialization error:", error);
                showMessage('An error occurred during Firebase initialization.', false);
            }
        }

        async function addSamplePatients() {
            const patientsCollection = collection(db, 'artifacts', appId, 'public', 'data', 'patients');
            const samplePatients = [
                { name: 'John Doe', dob: '1985-04-12', gender: 'Male', medicalHistory: 'No known allergies.' },
                { name: 'Jane Smith', dob: '1990-09-21', gender: 'Female', medicalHistory: 'Asthma, Penicillin allergy.' },
                { name: 'Michael Johnson', dob: '1972-01-05', gender: 'Male', medicalHistory: 'Hypertension, Type 2 Diabetes.' }
            ];
            for (const patient of samplePatients) {
                await addDoc(patientsCollection, patient);
            }
        }
        
        // UI Update Logic for Dashboard
        function updateDashboardUI() {
            if (!isAuthReady) return;
            for (const key in modules) {
                const module = modules[key];
                const currentProgress = moduleProgress[key] || 0;
                const progressPercentage = (currentProgress / module.steps) * 100;
                const progressEl = document.getElementById(module.progressKey);
                const statusEl = document.getElementById(module.statusId);
                
                if (progressEl) {
                    progressEl.style.width = `${progressPercentage}%`;
                }
                if (statusEl) {
                    statusEl.textContent = `${currentProgress}/${module.steps} steps complete`;
                }
            }
        }

        // Main Module Rendering Logic
        const contentArea = document.getElementById('content-area');

        const moduleTemplates = {
            'dashboard': `
                <div id="dashboard" class="page-content space-y-8">
                    <h2 class="text-2xl font-semibold mb-6 text-gray-700">My Progress</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div class="card bg-white p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-2">Patient Registration</h3>
                            <p class="text-gray-600 mb-4">Complete a full patient intake.</p>
                            <div class="bg-gray-200 rounded-full progress-bar">
                                <div id="pr-progress" class="bg-blue-500 rounded-full progress-bar transition-all"></div>
                            </div>
                            <p id="pr-status" class="text-sm text-gray-500 mt-2">0/5 steps complete</p>
                            <button data-module="patient-registration" class="mt-4 px-4 py-2 text-sm rounded-full font-semibold btn-primary text-white">Start</button>
                        </div>
                        <div class="card bg-white p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-2">Interactive Calendar</h3>
                            <p class="text-gray-600 mb-4">Master appointment scheduling.</p>
                            <div class="bg-gray-200 rounded-full progress-bar">
                                <div id="ic-progress" class="bg-blue-500 rounded-full progress-bar transition-all"></div>
                            </div>
                            <p id="ic-status" class="text-sm text-gray-500 mt-2">0/3 steps complete</p>
                            <button data-module="interactive-calendar" class="mt-4 px-4 py-2 text-sm rounded-full font-semibold btn-primary text-white">Start</button>
                        </div>
                        <div class="card bg-white p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-2">Medical Coding Quiz</h3>
                            <p class="text-gray-600 mb-4">Test your knowledge of codes.</p>
                            <div class="bg-gray-200 rounded-full progress-bar">
                                <div id="cq-progress" class="bg-blue-500 rounded-full progress-bar transition-all"></div>
                            </div>
                            <p id="cq-status" class="text-sm text-gray-500 mt-2">0/1 quiz complete</p>
                            <button data-module="coding-quiz" class="mt-4 px-4 py-2 text-sm rounded-full font-semibold btn-primary text-white">Start</button>
                        </div>
                        <div class="card bg-white p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-2">SOAP Notes</h3>
                            <p class="text-gray-600 mb-4">Practice creating a clinical note.</p>
                            <div class="bg-gray-200 rounded-full progress-bar">
                                <div id="sn-progress" class="bg-blue-500 rounded-full progress-bar transition-all"></div>
                            </div>
                            <p id="sn-status" class="text-sm text-gray-500 mt-2">0/4 steps complete</p>
                            <button data-module="soap-notes" class="mt-4 px-4 py-2 text-sm rounded-full font-semibold btn-primary text-white">Start</button>
                        </div>
                        <div class="card bg-white p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-2">Denial Management</h3>
                            <p class="text-gray-600 mb-4">Resolve a denied insurance claim.</p>
                            <div class="bg-gray-200 rounded-full progress-bar">
                                <div id="dm-progress" class="bg-blue-500 rounded-full progress-bar transition-all"></div>
                            </div>
                            <p id="dm-status" class="text-sm text-gray-500 mt-2">0/1 scenario complete</p>
                            <button data-module="denial-management" class="mt-4 px-4 py-2 text-sm rounded-full font-semibold btn-primary text-white">Start</button>
                        </div>
                        <div class="card bg-white p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-2">Prior Authorization</h3>
                            <p class="text-gray-600 mb-4">Learn the process for service approval.</p>
                            <div class="bg-gray-200 rounded-full progress-bar">
                                <div id="pa-progress" class="bg-blue-500 rounded-full progress-bar transition-all"></div>
                            </div>
                            <p id="pa-status" class="text-sm text-gray-500 mt-2">0/1 scenario complete</p>
                            <button data-module="prior-authorization" class="mt-4 px-4 py-2 text-sm rounded-full font-semibold btn-primary text-white">Start</button>
                        </div>
                        <div class="card bg-white p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-2">A/R Aging</h3>
                            <p class="text-gray-600 mb-4">Manage outstanding claims and billing.</p>
                            <div class="bg-gray-200 rounded-full progress-bar">
                                <div id="ar-progress" class="bg-blue-500 rounded-full progress-bar transition-all"></div>
                            </div>
                            <p id="ar-status" class="text-sm text-gray-500 mt-2">0/1 scenario complete</p>
                            <button data-module="ar-aging" class="mt-4 px-4 py-2 text-sm rounded-full font-semibold btn-primary text-white">Start</button>
                        </div>
                        <div class="card bg-white p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-2">E-Prescribing</h3>
                            <p class="text-gray-600 mb-4">Simulate creating and sending a prescription.</p>
                            <div class="bg-gray-200 rounded-full progress-bar">
                                <div id="ep-progress" class="bg-blue-500 rounded-full progress-bar transition-all"></div>
                            </div>
                            <p id="ep-status" class="text-sm text-gray-500 mt-2">0/1 scenario complete</p>
                            <button data-module="e-prescribing" class="mt-4 px-4 py-2 text-sm rounded-full font-semibold btn-primary text-white">Start</button>
                        </div>
                         <div class="card bg-white p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-2">Patient Data</h3>
                            <p class="text-gray-600 mb-4">View and manage simulated patient records.</p>
                            <div class="bg-gray-200 rounded-full progress-bar">
                                <div id="pd-progress" class="bg-blue-500 rounded-full progress-bar transition-all"></div>
                            </div>
                            <p id="pd-status" class="text-sm text-gray-500 mt-2">0/1 scenario complete</p>
                            <button data-module="patient-data" class="mt-4 px-4 py-2 text-sm rounded-full font-semibold btn-primary text-white">Start</button>
                        </div>
                        <div class="card bg-white p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-2">Vitals</h3>
                            <p class="text-gray-600 mb-4">Log a patient's vital signs.</p>
                            <div class="bg-gray-200 rounded-full progress-bar">
                                <div id="vitals-progress" class="bg-blue-500 rounded-full progress-bar transition-all"></div>
                            </div>
                            <p id="vitals-status" class="text-sm text-gray-500 mt-2">0/1 steps complete</p>
                            <button data-module="vitals" class="mt-4 px-4 py-2 text-sm rounded-full font-semibold btn-primary text-white">Start</button>
                        </div>
                    </div>
                    <div class="mt-8">
                        <button id="add-sample-data" class="px-6 py-3 bg-gray-600 text-white font-medium rounded-full shadow-md hover:bg-gray-700 transition-colors">Add Sample Data</button>
                    </div>
                </div>
            `,
            'patient-registration': `
                <div id="patient-registration" class="space-y-4">
                    <h2 class="text-2xl font-bold mb-4">Patient Registration</h2>
                    <p class="text-gray-600 mb-4">Follow the steps to complete a full patient intake.</p>
                    <div class="bg-gray-200 rounded-full progress-bar mb-4">
                        <div id="pr-module-progress" class="bg-blue-500 rounded-full progress-bar transition-all"></div>
                    </div>
                    <div id="pr-ui" class="bg-white p-6 rounded-lg shadow-md">

                            <button data-module="dashboard" class="mt-4 text-sm font-semibold text-blue-600 hover:underline">Return to Dashboard</button>
                        </div>
                    </div>
                </div>
            `,
            'interactive-calendar': `
                <div id="interactive-calendar" class="space-y-4">
                    <h2 class="text-2xl font-bold mb-4">Interactive Calendar</h2>
                    <p class="text-gray-600 mb-4">Click an empty slot to schedule a new appointment.</p>

                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <h3 id="current-month-year" class="text-lg font-bold"></h3>
                            <button id="next-month" class="p-2 rounded-full hover:bg-gray-200 transition-colors">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </button>
                        </div>
                        <div id="calendar-body" class="calendar-grid"></div>
                    </div>
                </div>
            `,
            'coding-quiz': `
                <div id="coding-quiz" class="space-y-4">
                    <h2 class="text-2xl font-bold mb-4">Medical Coding Quiz</h2>
                    <p class="text-gray-600 mb-4">Test your knowledge of common medical codes.</p>
                    <div class="bg-gray-200 rounded-full progress-bar mb-4">
                        <div id="cq-module-progress" class="bg-blue-500 rounded-full progress-bar transition-all"></div>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow-md">
                        <p id="cq-question" class="text-lg font-bold mb-4">Question loading...</p>
                        <div id="cq-options" class="space-y-2"></div>

                            <p id="cq-score-text" class="text-xl font-bold mb-2"></p>
                            <button id="cq-restart-btn" class="px-4 py-2 text-sm rounded-full font-semibold btn-primary text-white">Restart Quiz</button>
                        </div>
                    </div>
                </div>
            `,
            'soap-notes': `
                <div id="soap-notes" class="space-y-4">
                    <h2 class="text-2xl font-bold mb-4">SOAP Notes</h2>
                    <p class="text-gray-600 mb-4">Read the patient's chart and fill out the SOAP note below.</p>
                    <div class="bg-gray-200 rounded-full progress-bar mb-4">
                        <div id="sn-module-progress" class="bg-blue-500 rounded-full progress-bar transition-all"></div>
                    </div>
                    <div class="flex flex-col md:flex-row gap-6">
                        <div class="bg-white p-6 rounded-lg shadow-md md:w-1/2">
                            <h3 class="font-bold text-xl mb-4">Patient Chart: Sarah Davis</h3>

        };

        const contentArea = document.getElementById('content-area');

        function renderModule(moduleId) {
            const template = moduleTemplates[moduleId];
            if (template) {
                contentArea.innerHTML = template;
                document.getElementById('page-title').textContent = moduleId.replace(/-/g, ' ').split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                
                // Initialize specific module logic
                switch (moduleId) {
                    case 'dashboard':
                        updateDashboardUI();
                        break;
                    case 'patient-registration':
                        initPatientRegistration();
                        break;
                    case 'interactive-calendar':
                        initInteractiveCalendar();
                        break;
                    case 'coding-quiz':
                        initCodingQuiz();
                        break;
                    case 'soap-notes':
                        initSoapNotes();
                        break;
                    case 'denial-management':
                        initDenialManagement();
                        break;
                    case 'prior-authorization':
                        initPriorAuthorization();
                        break;
                    case 'ar-aging':
                        initARAging();
                        break;
                    case 'e-prescribing':
                        renderEPrescribing();
                        break;
                    case 'patient-data':
                        renderPatientData();
                        break;
                    case 'vitals':
                        initVitals();
                        break;
                }
            } else {
                contentArea.innerHTML = '<p class="text-xl text-gray-500">Module not found.</p>';
            }
        };

        // Module Logic Functions
        let prCurrentStep = 0;
        function initPatientRegistration() {
            prCurrentStep = moduleProgress['patient-registration'] || 0;
            const uiContainer = document.getElementById('pr-step-content');
            
            if (!uiContainer) { return; }

            uiContainer.innerHTML = ''; // Clear previous content
            
            if (prCurrentStep >= modules['patient-registration'].steps) {
                document.getElementById('pr-success').classList.remove('hidden');
            } else {
                const form = document.createElement('form');
                form.className = "space-y-4";
                form.id = "pr-form";
                
                const stepsContent = [
                    `<label>Patient Demographics</label>
                     <input type="text" placeholder="Full Name" name="name" class="rounded-lg p-2 w-full" required>`,
                    `<label>Contact Information</label>
                     <input type="email" placeholder="Email Address" name="email" class="rounded-lg p-2 w-full" required>`,
                    `<label>Insurance Provider</label>
                     <input type="text" placeholder="Insurance Company" name="insurance" class="rounded-lg p-2 w-full" required>`,
                    `<label>Chief Complaint</label>
                     <textarea placeholder="Describe the reason for the visit" name="complaint" rows="3" class="rounded-lg p-2 w-full" required></textarea>`,
                    `<label>Medical History</label>
                     <textarea placeholder="List allergies, past surgeries, and medications" name="history" rows="3" class="rounded-lg p-2 w-full" required></textarea>`
                ];

                form.innerHTML = `
                    <div class="input-group">${stepsContent[prCurrentStep]}</div>
                    <button type="button" id="pr-next-btn" class="px-6 py-3 bg-blue-600 text-white font-medium rounded-full shadow-md hover:bg-blue-700 transition-colors">Next</button>
                `;
                uiContainer.appendChild(form);
                
                const nextBtn = document.getElementById('pr-next-btn');
                if (nextBtn) {
                    nextBtn.addEventListener('click', () => {
                        const input = form.querySelector('input, textarea');
                        if (input && input.value.trim() !== '') {
                            const nextStepIndex = prCurrentStep + 1;
                            updateModuleProgress('patient-registration', nextStepIndex);
                        } else {
                            showMessage("Please fill out this field to continue.", false);
                        }
                    });
                }
            }
            updateModuleProgressUI('patient-registration');
        }

        let currentCalendarDate = new Date();
        function initInteractiveCalendar() {
            renderCalendar(currentCalendarDate);
            document.getElementById('prev-month').addEventListener('click', () => {
                currentCalendarDate.setMonth(currentCalendarDate.getMonth() - 1);
                renderCalendar(currentCalendarDate);
            });
            document.getElementById('next-month').addEventListener('click', () => {
                currentCalendarDate.setMonth(currentCalendarDate.getMonth() + 1);
                renderCalendar(currentCalendarDate);
            });
            updateModuleProgressUI('interactive-calendar');
        }

        function renderCalendar(date) {
            const calendarBody = document.getElementById('calendar-body');
            const monthYearHeader = document.getElementById('current-month-year');
            if (!calendarBody || !monthYearHeader) { return; }
            const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const firstDay = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
            const monthName = date.toLocaleString('default', { month: 'long' });
            monthYearHeader.textContent = `${monthName} ${date.getFullYear()}`;
            calendarBody.innerHTML = '';

            const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            daysOfWeek.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.textContent = day;
                dayHeader.className = 'text-center text-sm font-semibold p-2';
                calendarBody.appendChild(dayHeader);
            });

            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'calendar-day';
                calendarBody.appendChild(emptyCell);
            }
            for (let i = 1; i <= daysInMonth; i++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'calendar-day hover:bg-blue-100 transition-colors cursor-pointer';
                dayCell.innerHTML = `<span class="font-bold">${i}</span>`;
                dayCell.onclick = () => showModal(`Schedule appointment on ${monthName} ${i}`);
                calendarBody.appendChild(dayCell);
            }
        }
        
        const quizQuestions = [
            { question: "What does CPT stand for?", options: ["Current Patient Treatments", "Code of Professional Terms", "Current Procedural Terminology", "Clinical Procedure Techniques"], answer: "Current Procedural Terminology" },
            { question: "ICD-10-CM is used for...", options: ["Billing for supplies", "Documenting diagnoses", "Submitting claims", "Tracking appointments"], answer: "Documenting diagnoses" },
            { question: "Which code set is used for medical services?", options: ["ICD-10-CM", "HCPCS Level II", "DRG", "CPT"], answer: "CPT" }
        ];
        let currentQuizQuestionIndex = 0;
        let quizScore = 0;

        function initCodingQuiz() {
            currentQuizQuestionIndex = 0;
            quizScore = 0;
            loadQuizQuestion();
            updateModuleProgressUI('coding-quiz');
            document.getElementById('cq-restart-btn')?.addEventListener('click', initCodingQuiz);
        }

        function loadQuizQuestion() {
            const q = quizQuestions[currentQuizQuestionIndex];
            const optionsContainer = document.getElementById('cq-options');
            if (!q || !optionsContainer) { return; }
            
            document.getElementById('cq-question').textContent = q.question;
            optionsContainer.innerHTML = '';
            
            q.options.forEach(option => {
                const button = document.createElement('button');
                button.textContent = option;
                button.className = "w-full py-2 px-4 text-left rounded-md bg-gray-100 hover:bg-gray-200 transition-colors";
                button.addEventListener('click', () => checkQuizAnswer(option, q.answer));
                optionsContainer.appendChild(button);
            });
        }
        function checkQuizAnswer(selected, correct) {
            const feedbackEl = document.getElementById('cq-feedback');
            const optionsContainer = document.getElementById('cq-options');

            if (!feedbackEl || !optionsContainer) { return; }
            
            if (selected === correct) {
                quizScore++;
                feedbackEl.textContent = "Correct!";
            } else {
                feedbackEl.textContent = `Incorrect. The correct answer was: ${correct}`;
            }
            optionsContainer.innerHTML = '';
            currentQuizQuestionIndex++;
            if (currentQuizQuestionIndex < quizQuestions.length) {
                setTimeout(loadQuizQuestion, 1500);
            } else {
                feedbackEl.textContent = '';
                showQuizResults();
            }
        }
        function showQuizResults() {
            document.getElementById('cq-results')?.classList.remove('hidden');
            document.getElementById('cq-score-text')?.textContent = `You scored ${quizScore} out of ${quizQuestions.length}!`;
            updateModuleProgress('coding-quiz', 1);
        }

        function initSoapNotes() {
            const form = document.getElementById('sn-form');
            if (!form) { return; }
            let currentStep = moduleProgress['soap-notes'] || 0;
            
            function showStep(stepIndex) {
                form.querySelectorAll('[data-step]').forEach(el => el.style.display = 'none');
                const stepEl = form.querySelector(`[data-step="${stepIndex + 1}"]`);
                if (stepEl) {
                    stepEl.style.display = 'block';
                }
                if (stepIndex >= modules['soap-notes'].steps) {
                    form.style.display = 'none';
                    document.getElementById('sn-success')?.classList.remove('hidden');
                }
            }

            showStep(currentStep);

            document.getElementById('sn-next-btn')?.addEventListener('click', () => {
                const input = form.querySelector(`[data-step="${currentStep + 1}"] textarea`);
                if (input && input.value.trim() !== '') {
                    currentStep++;
                    updateModuleProgress('soap-notes', currentStep);
                    showStep(currentStep);
                } else {
                    showMessage("Please fill out this field to continue.", false);
                }
            });
            updateModuleProgressUI('soap-notes');
        }

        function initDenialManagement() {
            const dropTarget = document.getElementById('dm-drop-target');
            const dragItems = document.querySelectorAll('#dm-drag-items > div');
            const feedbackEl = document.getElementById('dm-feedback');
            if (!dropTarget || !dragItems.length || !feedbackEl) { return; }

            dragItems.forEach(item => {
                item.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', e.target.dataset.action);
                });
            });

            dropTarget.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropTarget.classList.add('drag-over');
            });

            dropTarget.addEventListener('dragleave', () => {
                dropTarget.classList.remove('drag-over');
            });

            dropTarget.addEventListener('drop', (e) => {
                e.preventDefault();
                dropTarget.classList.remove('drag-over');
                const data = e.dataTransfer.getData('text/plain');
                if (data === 'correct') {
                    feedbackEl.textContent = 'Correct! This is the most effective way to appeal the denial.';
                    feedbackEl.className = 'mt-4 text-center font-bold text-green-600';
                    updateModuleProgress('denial-management', 1);
                    dropTarget.textContent = 'Correct Answer Dropped!';
                } else {
                    feedbackEl.textContent = 'Incorrect. That action is not a standard or effective way to manage this type of denial.';
                    feedbackEl.className = 'mt-4 text-center font-bold text-red-600';
                }
            });
            updateModuleProgressUI('denial-management');
        }

        function initPriorAuthorization() {
            const options = document.querySelectorAll('#pa-options button');
            const feedbackEl = document.getElementById('pa-feedback');
            if (!options.length || !feedbackEl) { return; }

            options.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.dataset.answer === 'correct') {
                        feedbackEl.textContent = 'Correct! This is the required first step.';
                        feedbackEl.className = 'mt-4 text-center font-bold text-green-600';
                        updateModuleProgress('prior-authorization', 1);
                        options.forEach(b => b.disabled = true);
                    } else {
                        feedbackEl.textContent = 'Incorrect. That action would likely result in the service being denied.';
                        feedbackEl.className = 'mt-4 text-center font-bold text-red-600';
                    }
                });
            });
            updateModuleProgressUI('prior-authorization');
        }

        function initARAging() {
            const buttons = document.querySelectorAll('.ar-action-btn');
            const feedbackEl = document.getElementById('ar-feedback');
            if (!buttons.length || !feedbackEl) { return; }

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.dataset.claimAge === '90+') {
                        feedbackEl.textContent = 'Correct! Working the oldest claims first is a best practice to prevent them from becoming uncollectible.';
                        feedbackEl.className = 'mt-4 text-center font-bold text-green-600';
                        updateModuleProgress('ar-aging', 1);
                        buttons.forEach(b => b.disabled = true);
                    } else {
                        feedbackEl.textContent = 'Incorrect. While all claims need to be worked, the ones aged 90+ days are the most urgent.';
                        feedbackEl.className = 'mt-4 text-center font-bold text-red-600';
                    }
                });
            });
            updateModuleProgressUI('ar-aging');
        }

        let epCurrentStep = 0;
        function renderEPrescribing() {
            epCurrentStep = moduleProgress['e-prescribing'] || 0;
            
            const form = document.getElementById('ep-form');
            if (!form) { return; }

            if (epCurrentStep >= modules['e-prescribing'].steps) {
                form.style.display = 'none';
                document.getElementById('ep-success')?.classList.remove('hidden');
            } else {
                form.style.display = 'block';
                const epSelect = document.getElementById('ep-patient-select');
                if (epSelect) {
                    epSelect.innerHTML = '<option value="">-- Select a patient --</option>';
                    patientList.forEach(patient => {
                        const option = document.createElement('option');
                        option.value = patient.id;
                        option.textContent = patient.name;
                        epSelect.appendChild(option);
                    });
                }
                
                form.querySelectorAll('[data-step]').forEach(el => el.style.display = 'none');
                const stepEl = form.querySelector(`[data-step="${epCurrentStep + 1}"]`);
                if (stepEl) {
                    stepEl.style.display = 'block';
                }

                document.getElementById('ep-next-btn')?.addEventListener('click', () => {
                    const inputs = form.querySelector(`[data-step="${epCurrentStep + 1}"]`)?.querySelectorAll('input, select');
                    let isValid = true;
                    if (inputs) {
                        inputs.forEach(input => {
                            if (!input.value.trim()) {
                                isValid = false;
                            }
                        });
                    } else {
                        isValid = false;
                    }
                    if (isValid) {
                        const nextStepIndex = epCurrentStep + 1;
                        updateModuleProgress('e-prescribing', nextStepIndex);
                    } else {
                        showMessage("Please fill out all fields to continue.", false);
                    }
                });
            }
            updateModuleProgressUI('e-prescribing');
        }

        function renderPatientData() {
            const listContainer = document.getElementById('patient-list');
            if (!listContainer) { return; }
            listContainer.innerHTML = '';
            patientList.forEach(patient => {
                const item = document.createElement('div');
                item.className = 'patient-list-item bg-gray-100 hover:bg-gray-200 transition-colors p-3 rounded-lg cursor-pointer';
                item.textContent = patient.name;
                item.addEventListener('click', () => showPatientDetails(patient));
                listContainer.appendChild(item);
            });
            document.getElementById('add-patient-form')?.classList.add('hidden');
            document.getElementById('patient-details-container')?.classList.add('hidden');
            updateModuleProgressUI('patient-data');
        }

        function showPatientDetails(patient) {
            document.getElementById('patient-details-name').textContent = patient.name;
            document.getElementById('patient-details-dob').textContent = patient.dob;
            document.getElementById('patient-details-gender').textContent = patient.gender;
            document.getElementById('patient-details-history').textContent = patient.medicalHistory;
            document.getElementById('patient-details-container')?.classList.remove('hidden');
            document.querySelectorAll('.patient-list-item').forEach(item => item.classList.remove('active', 'bg-gray-200'));
            const activeItem = document.querySelector(`.patient-list-item[data-patient-id="${patient.id}"]`);
            if (activeItem) {
                activeItem.classList.add('active', 'bg-gray-200');
            }
            updateModuleProgress('patient-data', 1);
        }

        function initPatientData() {
            renderPatientData();
            document.getElementById('add-patient-btn')?.addEventListener('click', renderPatientForm);
            document.getElementById('hide-patient-details-btn')?.addEventListener('click', hidePatientDetails);
            document.getElementById('hide-patient-form-btn')?.addEventListener('click', hidePatientForm);
            document.getElementById('add-patient-form')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const form = e.target;
                if (!form.reportValidity()) {
                    return;
                }
                const patientData = {
                    name: form.name.value,
                    dob: form.dob.value,
                    gender: form.gender.value,
                    medicalHistory: form.history.value,
                };
                const patientsCollection = collection(db, 'artifacts', appId, 'public', 'data', 'patients');
                try {
                    await addDoc(patientsCollection, patientData);
                    showMessage('Patient added successfully!', true);
                    form.reset();
                    hidePatientForm();
                } catch (error) {
                    console.error("Error adding patient:", error);
                    showMessage('Failed to add patient. Check console for details.', false);
                }
            });
        }
        
        function renderPatientForm() {
            document.getElementById('add-patient-form')?.classList.remove('hidden');
            document.getElementById('patient-details-container')?.classList.add('hidden');
            document.querySelectorAll('.patient-list-item').forEach(item => item.classList.remove('active', 'bg-gray-200'));
        };

        function hidePatientDetails() {
            document.getElementById('patient-details-container')?.classList.add('hidden');
        };
        
        function hidePatientForm() {
            document.getElementById('add-patient-form')?.classList.add('hidden');
        };
        
        function initVitals() {
            const form = document.getElementById('vitals-form');
            if (!form) { return; }
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!form.reportValidity()) {
                    return;
                }
                const vitalsData = {
                    patientName: form['patient-name'].value,
                    temperature: form.temperature.value,
                    bloodPressure: form['blood-pressure'].value,
                    heartRate: form['heart-rate'].value,
                    timestamp: new Date().toISOString()
                };
                const vitalsCollection = collection(db, 'artifacts', appId, 'users', userId, 'vitals');
                try {
                    await addDoc(vitalsCollection, vitalsData);
                    showMessage('Vitals logged successfully!', true);
                    updateModuleProgress('vitals', 1);
                    form.reset();
                    document.getElementById('vitals-success')?.classList.remove('hidden');
                    form.style.display = 'none';
                } catch (error) {
                    console.error("Error logging vitals:", error);
                    showMessage('Failed to log vitals. Check console for details.', false);
                }
            });
            updateModuleProgressUI('vitals');
        }
        
        // Helper Functions
        function updateModuleProgressUI(moduleId) {
            const module = modules[moduleId];
            if (module) {
                const currentProgress = moduleProgress[moduleId] || 0;
                const progressPercentage = (currentProgress / module.steps) * 100;
                const progressEl = document.getElementById(`${moduleId}-module-progress`);
                if (progressEl) {
                    progressEl.style.width = `${progressPercentage}%`;
                }
            }
        }

        async function updateModuleProgress(moduleId, newProgress) {
            if (!isAuthReady) return;
            // Optimistically update the local state first for a responsive UI
            moduleProgress[moduleId] = newProgress;
            updateDashboardUI();
            updateModuleProgressUI(moduleId);

            const userDocRef = doc(db, 'artifacts', appId, 'users', userId);
            const progressData = {};
            progressData[`progress.${moduleId}`] = newProgress;
            
            try {
                await setDoc(userDocRef, progressData, { merge: true });
            } catch(e) {
                console.error("Error updating progress:", e);
                if (moduleProgress[moduleId]) {
                    moduleProgress[moduleId] = moduleProgress[moduleId] - 1;
                }
                updateDashboardUI();
                updateModuleProgressUI(moduleId);
                showMessage("Failed to save progress. Please check your connection.", false);
            }
        }

        function showMessage(text, isSuccess) {
            const el = document.getElementById('message-box');
            el.textContent = text;
            el.classList.remove('hidden', 'bg-red-500', 'bg-green-500');
            el.classList.add(isSuccess ? 'bg-green-500' : 'bg-red-500');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }
        
        function showModal(contentHtml) {
            const modalContainer = document.getElementById('modal-container');
            const modalContent = document.getElementById('modal-content');
            if (!modalContainer || !modalContent) { return; }
            modalContent.innerHTML = `
                <h3 class="text-xl font-bold mb-4">New Appointment</h3>
                <p class="mb-4">${contentHtml}</p>
                <div class="space-y-4">
                    <label>Patient Name:</label>
                    <input type="text" placeholder="Patient Name" class="w-full rounded-lg p-2 border-gray-300" />
                    <label>Reason for Visit:</label>
                    <textarea placeholder="Reason" rows="3" class="w-full rounded-lg p-2 border-gray-300"></textarea>
                </div>
                <div class="flex justify-end gap-2 mt-4">
                    <button id="modal-cancel" class="px-4 py-2 text-sm rounded-full font-semibold bg-gray-300 text-gray-700 hover:bg-gray-400">Cancel</button>
                    <button id="modal-confirm" class="px-4 py-2 text-sm rounded-full font-semibold btn-primary text-white">Save Appointment</button>
                </div>
            `;
            modalContainer.classList.remove('hidden');

            document.getElementById('modal-cancel')?.addEventListener('click', () => {
                modalContainer.classList.add('hidden');
            });
            document.getElementById('modal-confirm')?.addEventListener('click', () => {
                showMessage('Appointment saved successfully!', true);
                modalContainer.classList.add('hidden');
                updateModuleProgress('interactive-calendar', 3);
            });
        }

        // Sample Data
        function addSampleData() {
            if (!isAuthReady) {
                showMessage("Authentication not ready. Please wait a moment.", false);
                return;
            }
            const userDocRef = doc(db, 'artifacts', appId, 'users', userId);
            const sampleProgress = {
                'patient-registration': 5,
                'interactive-calendar': 3,
                'coding-quiz': 1,
                'soap-notes': 4,
                'denial-management': 1,
                'prior-authorization': 1,
                'ar-aging': 1,
                'e-prescribing': 3,
                'patient-data': 1,
                'vitals': 1
            };
            setDoc(userDocRef, { progress: sampleProgress }, { merge: true })
                .then(() => showMessage("Sample data added successfully!", true))
                .catch((error) => {
                    console.error("Error adding sample data:", error);
                    showMessage("Failed to add sample data. Check console for details.", false);
                });
        };

        // Event listener for module navigation and buttons
        function setupEventListeners() {
            document.querySelectorAll('[data-module]').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.preventDefault();
                    const moduleId = e.currentTarget.dataset.module;
                    renderModule(moduleId);
                });
            });

            document.getElementById('add-sample-data')?.addEventListener('click', addSampleData);
            document.getElementById('mobile-menu-toggle')?.addEventListener('click', () => {
                document.getElementById('sidebar')?.classList.toggle('active');
            });
        }

        // Initial setup
        document.addEventListener('DOMContentLoaded', () => {
            initializeFirebase();
            renderModule('dashboard');
            setupEventListeners();
        });

    </script>
</body>
</html>
